services:
  unified-comms:
    build: .
    ports:
      - "3100:3100"
      - "3101:3101"
    environment:
      UC_PORT: 3100
      UC_WS_PORT: 3101
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-chekd-uc-dev-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
